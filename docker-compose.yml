services:
  api:
    build: ./api
    environment:
      PORT: "3001"
      DB_PATH: /data/db.sqlite
      JWT_SECRET: "${JWT_SECRET:-dev-secret-change-in-production}"
      JWT_EXPIRES_IN: "7d"
      CORS_ORIGIN: "https://${APP_HOST:-localhost}:${FRONTEND_PORT:-8080}"
    volumes:
      - api_data:/data
    restart: unless-stopped
    networks: [app-net]

  frontend:
    build:
      context: ./frontend
    environment:
      NUXT_API_INTERNAL_BASE: "http://api:3001"
    restart: unless-stopped
    depends_on: [api]
    networks: [app-net]

  nginx:
    image: nginx:alpine
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
      - "${API_PORT:-8081}:8081"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /root/cert:/etc/nginx/certs:ro
    restart: unless-stopped
    depends_on: [frontend, api]
    networks: [app-net]

volumes:
  api_data:

networks:
  app-net:
