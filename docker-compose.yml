services:
  api:
    build: ./api
    ports:
      - "${API_PORT:-8081}:3001"
    environment:
      PORT: "3001"
      DB_PATH: /data/db.sqlite
      JWT_SECRET: "${JWT_SECRET:-dev-secret-change-in-production}"
      JWT_EXPIRES_IN: "7d"
      CORS_ORIGIN: "http://${APP_HOST:-localhost}:${FRONTEND_PORT:-8080}"
    volumes:
      - api_data:/data
    restart: unless-stopped
    networks: [app-net]

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-8080}:3000"
    environment:
      NUXT_API_INTERNAL_BASE: "http://api:3001"
    restart: unless-stopped
    depends_on: [api]
    networks: [app-net]

volumes:
  api_data:

networks:
  app-net: